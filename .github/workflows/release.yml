name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build & Archive
        run: |
          xcodebuild -project ClaudeUsageWidget.xcodeproj \
            -scheme ClaudeUsageWidget \
            -configuration Release \
            -archivePath build/ClaudeUsageWidget.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app
        run: |
          mkdir -p build/export
          cp -R build/ClaudeUsageWidget.xcarchive/Products/Applications/ClaudeUsageWidget.app \
            build/export/ClaudeUsageWidget.app

      - name: Package .zip
        run: |
          ditto -c -k --keepParent build/export/ClaudeUsageWidget.app \
            build/ClaudeUsageWidget.zip

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 build/ClaudeUsageWidget.zip | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeUsageWidget.zip
          generate_release_notes: true

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          VERSION: ${{ github.ref_name }}
        run: |
          git clone https://x-access-token:$HOMEBREW_TAP_TOKEN@github.com/${{ github.repository_owner }}/homebrew-claude-usage.git /tmp/tap
          VERSION_NUM="${VERSION#v}"
          sed -i '' \
            -e "s|version \".*\"|version \"$VERSION_NUM\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA256\"|" \
            -e "s|/download/v[^/]*/|/download/$VERSION/|" \
            /tmp/tap/Casks/claude-usage-widget.rb
          cd /tmp/tap
          git config user.email "bot@github.com"
          git config user.name "Release Bot"
          git add -A
          git commit -m "Update claude-usage-widget to $VERSION_NUM"
          git push
